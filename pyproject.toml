[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [".venv", "reports/output", "data-gen/output"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.black]
target-version = ["py311"]
line-length = 100

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
exclude = "tests/"
files = ["mcp-server", "graph", "data-gen"]

[tool.pytest.ini_options]
markers = [
    "integration: tests contra un Neo4j real vía testcontainers (necesitan Docker). Usar `pytest -m integration` para ejecutarlos, o `-m \"not integration\"` para excluirlos.",
]
